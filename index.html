<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Technician Parts Lookup System</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 1300px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 24px 28px;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 6px 0;
            color: #1e2a3e;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .badge {
            background: #eef2ff;
            color: #1e40af;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .login-area, .search-area {
            background: #f8fafc;
            border-radius: 28px;
            padding: 20px 24px;
            margin-bottom: 28px;
            border: 1px solid #e2e8f0;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 18px 0 12px 0;
            align-items: flex-end;
        }
        .input-field {
            flex: 1;
            min-width: 180px;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #0f172a;
        }
        input, button {
            padding: 12px 14px;
            border-radius: 60px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
            width: 100%;
            background: white;
        }
        button {
            background: #1e293b;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:hover {
            background: #0f172a;
        }
        .otp-btn {
            background: #2c3e66;
        }
        .voice-btn {
            background: #0f3b2c;
            width: auto;
        }
        .logout-btn {
            background: #b91c1c;
            width: auto;
            padding: 8px 20px;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            justify-content: space-between;
        }
        .results-table {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            background: #f1f5f9;
            padding: 14px 12px;
            text-align: left;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #eef2ff;
        }
        .highlight {
            background-color: #fef9c3;
            font-weight: bold;
            border-radius: 12px;
        }
        .status {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #334155;
        }
        .error {
            color: #b91c1c;
        }
        .success {
            color: #15803d;
        }
        @media (max-width: 700px) {
            .container { padding: 16px; }
            th, td { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1>
        🔧 Technician Parts Assistant
        <span class="badge" id="authStatus">🔒 Not Logged In</span>
    </h1>

    <!-- LOGIN SECTION -->
    <div id="loginSection" class="login-area">
        <h3>🔐 Daily Access (OTP)</h3>
        <p>Enter your email to receive a 6-digit code. Valid for today only.</p>
        <div class="input-group">
            <div class="input-field">
                <label>📧 Technician Email</label>
                <input type="email" id="techEmail" placeholder="tech@example.com">
            </div>
            <div class="input-field">
                <label>🔑 OTP Code</label>
                <input type="text" id="otpCode" placeholder="6-digit code">
            </div>
            <div style="display: flex; gap: 10px; align-items: flex-end;">
                <button id="sendOtpBtn" class="otp-btn">📨 Send OTP</button>
                <button id="verifyLoginBtn">✅ Login</button>
            </div>
        </div>
        <div id="loginMessage" class="status"></div>
    </div>

    <!-- SEARCH SECTION (visible after login) -->
    <div id="searchSection" style="display: none;">
        <div class="search-area">
            <div class="flex-row">
                <h3 style="margin:0">🔍 Search Parts</h3>
                <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
            </div>
            <div class="input-group">
                <div class="input-field" style="flex:2">
                    <label>📦 Model Name</label>
                    <input type="text" id="modelSearch" placeholder="e.g. Quartz Oven 28QOLCD1" list="modelSuggestions">
                    <datalist id="modelSuggestions"></datalist>
                </div>
                <div class="input-field" style="flex:3">
                    <label>🔧 Part Name (type or speak)</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="partSearch" placeholder="e.g. Dehydration Tray, Fan Motor" list="partSuggestions" style="flex:4">
                        <button id="voiceSearchBtn" class="voice-btn" style="flex:0;">🎤 Speak</button>
                    </div>
                    <datalist id="partSuggestions"></datalist>
                </div>
                <div>
                    <label>⚡</label>
                    <button id="searchBtn" style="background:#0f3b2c;">🔎 Search</button>
                </div>
            </div>
            <div id="searchStatus" class="status"></div>
        </div>

        <div class="results-table">
            <table id="resultsTable">
                <thead>
                    <tr><th>MODEL NAME</th><th>PART NAME</th><th>PART CODE</th></tr>
                </thead>
                <tbody id="resultsBody">
                    <tr><td colspan="3" style="text-align:center;">✨ Login and search to see part codes ✨</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let masterParts = [];
    let isLoggedIn = false;

    // Load JSON data
    async function loadMasterData() {
        try {
            const response = await fetch('./oven_data.json');
            if (!response.ok) throw new Error('oven_data.json not found');
            const jsonData = await response.json();
            masterParts = jsonData.map(row => ({
                model: (row["MODEL NAME"] || "").toString().trim(),
                part: (row["PART NAME"] || "").toString().trim(),
                code: (row["PART CODE"] || "").toString().trim()
            })).filter(p => p.model && p.part && p.code);
            
            // Build suggestions
            const modelSet = new Set();
            const partSet = new Set();
            masterParts.forEach(p => { modelSet.add(p.model); partSet.add(p.part); });
            document.getElementById("modelSuggestions").innerHTML = [...modelSet].sort().map(m => `<option value="${m.replace(/"/g, '&quot;')}">`).join('');
            document.getElementById("partSuggestions").innerHTML = [...partSet].sort().map(part => `<option value="${part.replace(/"/g, '&quot;')}">`).join('');
            
            document.getElementById("searchStatus").innerHTML = `<span class="success">✅ Loaded ${masterParts.length} parts</span>`;
        } catch (err) {
            document.getElementById("searchStatus").innerHTML = `<span class="error">❌ Error: oven_data.json missing. Upload it to the same folder.</span>`;
        }
    }

    // OTP Functions (Demo Mode - shows on screen)
    function generateOTP() {
        return Math.floor(100000 + Math.random() * 900000).toString();
    }

    function storeOTP(email, otp) {
        const expiry = Date.now() + (24 * 60 * 60 * 1000);
        localStorage.setItem(`otp_${email}`, JSON.stringify({ otp, expiry, email }));
        // Show OTP on screen (Demo mode)
        alert(`🔐 DEMO MODE - Your OTP for ${email} is: ${otp}\n\nThis code is valid for 24 hours.`);
    }

    function verifyOTP(email, enteredOtp) {
        const raw = localStorage.getItem(`otp_${email}`);
        if (!raw) return false;
        const data = JSON.parse(raw);
        if (data.email !== email) return false;
        if (Date.now() > data.expiry) return false;
        return data.otp === enteredOtp;
    }

    document.getElementById("sendOtpBtn").addEventListener("click", () => {
        const email = document.getElementById("techEmail").value.trim();
        if (!email || !email.includes("@")) {
            document.getElementById("loginMessage").innerHTML = `<span class="error">❌ Enter a valid email address.</span>`;
            return;
        }
        const otp = generateOTP();
        storeOTP(email, otp);
        document.getElementById("loginMessage").innerHTML = `<span class="success">✅ OTP sent! Check popup or email (demo mode).</span>`;
    });

    document.getElementById("verifyLoginBtn").addEventListener("click", () => {
        const email = document.getElementById("techEmail").value.trim();
        const otp = document.getElementById("otpCode").value.trim();
        if (!email || !otp) {
            document.getElementById("loginMessage").innerHTML = `<span class="error">❌ Email and OTP required.</span>`;
            return;
        }
        if (verifyOTP(email, otp)) {
            isLoggedIn = true;
            sessionStorage.setItem("tech_logged_in", JSON.stringify({ loggedIn: true, email, timestamp: Date.now() }));
            document.getElementById("authStatus").innerHTML = `✅ Logged: ${email}`;
            document.getElementById("loginSection").style.display = "none";
            document.getElementById("searchSection").style.display = "block";
            document.getElementById("loginMessage").innerHTML = "";
        } else {
            document.getElementById("loginMessage").innerHTML = `<span class="error">❌ Invalid or expired OTP. Request new code.</span>`;
        }
    });

    // Restore session
    function restoreSession() {
        const saved = sessionStorage.getItem("tech_logged_in");
        if (saved) {
            try {
                const { loggedIn, email, timestamp } = JSON.parse(saved);
                if (loggedIn && email && (Date.now() - timestamp < 24*3600*1000)) {
                    isLoggedIn = true;
                    document.getElementById("authStatus").innerHTML = `✅ Logged: ${email}`;
                    document.getElementById("loginSection").style.display = "none";
                    document.getElementById("searchSection").style.display = "block";
                }
            } catch(e) {}
        }
    }

    document.getElementById("logoutBtn")?.addEventListener("click", () => {
        isLoggedIn = false;
        sessionStorage.removeItem("tech_logged_in");
        document.getElementById("authStatus").innerHTML = "🔒 Not Logged In";
        document.getElementById("loginSection").style.display = "block";
        document.getElementById("searchSection").style.display = "none";
        document.getElementById("techEmail").value = "";
        document.getElementById("otpCode").value = "";
    });

    // Search function
    function performSearch() {
        if (!isLoggedIn) {
            alert("Please login first.");
            return;
        }
        const modelInput = document.getElementById("modelSearch").value.trim().toLowerCase();
        const partInput = document.getElementById("partSearch").value.trim().toLowerCase();
        
        let filtered = masterParts;
        if (modelInput) filtered = filtered.filter(p => p.model.toLowerCase().includes(modelInput));
        if (partInput) filtered = filtered.filter(p => p.part.toLowerCase().includes(partInput));
        
        if (filtered.length === 0) {
            document.getElementById("resultsBody").innerHTML = `<tr><td colspan="3" style="text-align:center;">🔍 No matching parts found</td></tr>`;
            return;
        }
        
        const tbody = document.getElementById("resultsBody");
        tbody.innerHTML = "";
        for (let row of filtered) {
            const tr = document.createElement("tr");
            let modelDisplay = modelInput ? row.model.replace(new RegExp(`(${modelInput})`, 'gi'), `<span class="highlight">$1</span>`) : row.model;
            let partDisplay = partInput ? row.part.replace(new RegExp(`(${partInput})`, 'gi'), `<span class="highlight">$1</span>`) : row.part;
            tr.innerHTML = `<td>${modelDisplay}</td><td>${partDisplay}</td><td style="font-weight:500;">${row.code}</td>`;
            tbody.appendChild(tr);
        }
    }

    // Voice Search
    function startVoiceSearch() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            alert("Voice not supported in this browser. Use Chrome.");
            return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.start();
        const voiceBtn = document.getElementById("voiceSearchBtn");
        voiceBtn.textContent = "🎙️ Listening...";
        recognition.onresult = (event) => {
            const spoken = event.results[0][0].transcript;
            document.getElementById("partSearch").value = spoken;
            voiceBtn.textContent = "🎤 Speak";
            performSearch();
        };
        recognition.onerror = () => {
            voiceBtn.textContent = "🎤 Speak";
            alert("Could not hear you. Please type.");
        };
        recognition.onend = () => { voiceBtn.textContent = "🎤 Speak"; };
    }

    document.getElementById("searchBtn").addEventListener("click", performSearch);
    document.getElementById("voiceSearchBtn").addEventListener("click", startVoiceSearch);
    document.getElementById("partSearch").addEventListener("keypress", (e) => { if (e.key === "Enter") performSearch(); });
    document.getElementById("modelSearch").addEventListener("keypress", (e) => { if (e.key === "Enter") performSearch(); });
    
    loadMasterData();
    restoreSession();
</script>
</body>
</html>
